<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Mode - Sort Lab</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/shell.css">
</head>
<body data-theme="dark">
  <div class="page-wrapper">
    <div class="sim-layout compare-layout">
      <aside class="left-panel" id="leftPanel">
        <div class="panel-header">
          <span class="algo-badge">Competition Mode</span>
          <button class="collapse-btn" id="collapseLeftBtn" type="button">&lsaquo;</button>
        </div>
        <div class="panel-body">
          <section class="control-group">
            <h3>Data Setup</h3>
            <label class="control-field" for="sizeInput">
              <span>Array Size</span>
              <b id="sizeValue">10</b>
            </label>
            <input id="sizeInput" type="range" min="6" max="18" value="10" step="1">

            <label class="control-field" for="patternSelect">
              <span>Pattern</span>
            </label>
            <select id="patternSelect">
              <option value="random">Random</option>
              <option value="reversed">Reversed</option>
              <option value="nearly_sorted">Nearly Sorted</option>
              <option value="few_unique">Few Unique</option>
            </select>

            <button class="control-button" id="regenerateBtn" type="button">Generate Shared Array</button>
          </section>

          <section class="control-group">
            <h3>Playback</h3>
            <div class="button-grid two-up">
              <button class="control-button" id="backBtn" type="button">&larr; Prev</button>
              <button class="control-button accent" id="nextBtn" type="button">Next &rarr;</button>
              <button class="control-button accent" id="playBtn" type="button">Play</button>
              <button class="control-button" id="pauseBtn" type="button">Pause</button>
            </div>
            <button class="control-button ghost" id="resetBtn" type="button">Reset</button>
          </section>

          <section class="control-group">
            <h3>Panels</h3>
            <button class="control-button" id="addLaneBtn" type="button">Add Algorithm Panel</button>
          </section>

          <section class="control-group">
            <h3>Speed</h3>
            <label class="control-field" for="speed">
              <span>Frame Delay</span>
              <b id="speedValue">300 ms</b>
            </label>
            <input id="speed" type="range" min="10" max="1000" value="300" step="10">
            <div class="button-grid three-up presets">
              <button class="pill-btn active" id="speedNormalBtn" type="button">Normal</button>
              <button class="pill-btn" id="speedFastBtn" type="button">Fast</button>
              <button class="pill-btn" id="speedTurboBtn" type="button">Turbo</button>
            </div>
          </section>
        </div>
      </aside>

      <main class="center-panel compare-center">
        <div id="comparePanel">
          <div class="compare-stack" id="laneContainer">
            <!-- Dynamic lanes injected here -->
          </div>
        </div>
      </main>

      <aside class="right-panel" id="rightPanel">
        <div class="panel-header">
          <span class="panel-title">Race Summary</span>
          <button class="collapse-btn" id="collapseRightBtn" type="button">&rsaquo;</button>
        </div>
        <div class="panel-body">
          <div class="summary-card">
            <span class="summary-label">Shared Array</span>
            <code id="sharedArrayView" style="font-size: 0.8rem;">[]</code>
          </div>
          <div class="summary-card">
            <span class="summary-label">Global Step</span>
            <b id="globalStep">0 / 0</b>
          </div>
          <div class="compare-summary-grid" id="rankSummary">
            <!-- Dynamic rank cards here -->
          </div>
          <div class="code-note">
            Adaptive animations scale with speed to prevent bottlenecks during high-speed races.
          </div>
        </div>
      </aside>
    </div>

    <section class="how-section">
      <h3>How to read this</h3>
      <div class="legend-row">
        <span class="legend-pill"><i class="swatch compare"></i> Comparison</span>
        <span class="legend-pill"><i class="swatch swap"></i> Swap</span>
        <span class="legend-pill"><i class="swatch min"></i> Selection Min</span>
        <span class="legend-pill"><i class="swatch key"></i> Insertion Key</span>
        <span class="legend-pill"><i class="swatch shift"></i> Shift</span>
        <span class="legend-pill"><i class="swatch sorted"></i> Sorted</span>
      </div>
    </section>
  </div>

  <script src="lib/p5.min.js"></script>
  <script src="js/updater.js"></script>
  <script src="js/algorithms/bubble.js"></script>
  <script src="js/algorithms/selection.js"></script>
  <script src="js/algorithms/insertion.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sketches/compareSketch.js"></script>
  <script>
    let sharedArray = SortLabControls.generateArray(10, 'random');
    let lanes = []; // Array of { id, algoName, sketch, steps }
    let masterSteps = [];
    let nextLaneId = 0;

    const algoMap = {
      'bubble': BubbleAlgorithm,
      'selection': SelectionAlgorithm,
      'insertion': InsertionAlgorithm
    };

    const laneContainer = document.getElementById('laneContainer');
    const rankSummary = document.getElementById('rankSummary');

    function createLane(algoName = 'bubble') {
      const id = 'lane-' + (nextLaneId++);
      const lane = { id, algoName, sketch: null, steps: [] };
      
      const section = document.createElement('section');
      section.className = 'compare-lane';
      section.id = id;
      section.innerHTML = `
        <div class="lane-header">
          <div style="display:flex; align-items:center; gap:0.5rem; flex:1;">
             <select class="lane-algo-select" data-lane-id="${id}">
                <option value="bubble" ${algoName === 'bubble' ? 'selected' : ''}>Bubble Sort</option>
                <option value="selection" ${algoName === 'selection' ? 'selected' : ''}>Selection Sort</option>
                <option value="insertion" ${algoName === 'insertion' ? 'selected' : ''}>Insertion Sort</option>
             </select>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span class="lane-status" id="${id}-done">Running</span>
            <button class="lane-remove-btn" type="button" data-lane-id="${id}">&times;</button>
          </div>
        </div>
        <div class="canvas-container compact" id="${id}-canvas" data-height="220"></div>
        <div class="narration-banner compact" id="${id}-narration">Waiting...</div>
        <div class="stats-row compact">
          <div class="stat"><span class="stat-label">Step</span><b id="${id}-step">0</b></div>
          <div class="stat"><span class="stat-label">Comp</span><b id="${id}-comp">0</b></div>
          <div class="stat"><span class="stat-label">Op</span><b id="${id}-op">0</b></div>
        </div>
      `;
      laneContainer.appendChild(section);

      lane.sketch = mountSketch(id + '-canvas', algoName);
      
      // Select change
      section.querySelector('.lane-algo-select').addEventListener('change', (e) => {
        lane.algoName = e.target.value;
        if (lane.sketch) lane.sketch.destroy();
        lane.sketch = mountSketch(id + '-canvas', lane.algoName);
        controls.reset();
      });

      // Remove lane
      section.querySelector('.lane-remove-btn').addEventListener('click', () => {
        if (lanes.length <= 1) return; // Keep at least one
        lanes = lanes.filter(l => l.id !== id);
        lane.sketch.destroy();
        section.remove();
        controls.reset();
      });

      lanes.push(lane);
      return lane;
    }

    function rebuildStepSets(array) {
      sharedArray = array.slice();
      lanes.forEach(lane => {
        lane.steps = algoMap[lane.algoName].computeSteps(sharedArray);
      });
      
      const maxSteps = Math.max(...lanes.map(l => l.steps.length), 1);
      masterSteps = Array.from({ length: maxSteps }, (_, index) => ({ index }));
      return masterSteps;
    }

    function stepAt(steps, index) {
      return steps[Math.min(index, steps.length - 1)];
    }

    function finishRank(length, allLengths) {
      const ordered = [...new Set(allLengths)].sort((a, b) => a - b);
      return ordered.indexOf(length) + 1;
    }

    const sketchGroup = {
      applyStep: function (step) {
        lanes.forEach(lane => {
          const s = stepAt(lane.steps, step.index);
          lane.sketch.applyStep(s);
          const laneEl = document.getElementById(lane.id);
          if (s.type === 'done') laneEl.classList.add('lane-done');
          else laneEl.classList.remove('lane-done');
        });
      },
      resetBars: function (array) {
        lanes.forEach(l => l.sketch.resetBars(array));
      },
      setLerpSpeed: function (val) {
        lanes.forEach(l => l.sketch.setLerpSpeed(val));
      },
      setSpeed: function (ms) {
        lanes.forEach(l => l.sketch.setSpeed(ms));
      }
    };

    // Initial lanes
    createLane('bubble');
    createLane('selection');
    createLane('insertion');

    const controls = initControls({
      sketch: sketchGroup,
      initialArray: sharedArray,
      getSteps: () => masterSteps,
      setSteps: (s) => { masterSteps = s; },
      buildSteps: (array) => rebuildStepSets(array),
      onStepChange: (step, idx, total) => {
        document.getElementById('globalStep').textContent = (idx + 1) + ' / ' + total;
        document.getElementById('sharedArrayView').textContent = '[' + sharedArray.join(', ') + ']';
        
        const allLengths = lanes.map(l => l.steps.length);
        
        rankSummary.innerHTML = '';

        lanes.forEach(lane => {
          const s = stepAt(lane.steps, idx);
          const i = lane.id;
          
          document.getElementById(i + '-narration').textContent = s.action;
          document.getElementById(i + '-step').textContent = (Math.min(idx, lane.steps.length - 1) + 1) + ' / ' + lane.steps.length;
          
          const compEl = document.getElementById(i + '-comp');
          if (compEl.textContent !== String(s.comparisons)) {
             compEl.textContent = s.comparisons; SortLabShell.bumpStat(compEl);
          }
          
          const opVal = typeof s.swaps !== 'undefined' ? s.swaps : (typeof s.shifts !== 'undefined' ? s.shifts : 0);
          const opEl = document.getElementById(i + '-op');
          if (opEl.textContent !== String(opVal)) {
             opEl.textContent = opVal; SortLabShell.bumpStat(opEl);
          }
          
          document.getElementById(i + '-done').textContent = idx >= lane.steps.length - 1 ? 'Done' : 'Running';

          // Rank Card
          const rank = finishRank(lane.steps.length, allLengths);
          const rankCard = document.createElement('div');
          rankCard.className = 'summary-card';
          rankCard.innerHTML = `
            <span class="summary-label">${lane.algoName}</span>
            <b>Rank ${rank}</b> at step ${lane.steps.length}
          `;
          rankSummary.appendChild(rankCard);
        });
      },
      speedEl: document.getElementById('speed'),
      playBtn: document.getElementById('playBtn'),
      pauseBtn: document.getElementById('pauseBtn'),
      nextBtn: document.getElementById('nextBtn'),
      backBtn: document.getElementById('backBtn'),
      resetBtn: document.getElementById('resetBtn'),
      speedNormalBtn: document.getElementById('speedNormalBtn'),
      speedFastBtn: document.getElementById('speedFastBtn'),
      speedTurboBtn: document.getElementById('speedTurboBtn'),
      sizeEl: document.getElementById('sizeInput'),
      sizeValueEl: document.getElementById('sizeValue'),
      patternEl: document.getElementById('patternSelect'),
      regenerateBtn: document.getElementById('regenerateBtn'),
      speedValueEl: document.getElementById('speedValue'),
    });

    const addLaneBtn = document.getElementById('addLaneBtn');
    if (addLaneBtn) {
      addLaneBtn.addEventListener('click', () => {
        createLane('bubble');
        controls.reset();
      });
    }

    SortLabShell.registerPageRuntime({
      controls: controls,
      onTileContentMounted: (content) => {
        if (content === 'compare') SortLabShell.dispatchResize(0);
      }
    });
  </script>
</body>
</html>
